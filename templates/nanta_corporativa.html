<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>
  @page { size: A4; margin: 13mm; }
  body { font-family: Arial, Helvetica, sans-serif; color: #2b2d38; margin: 0; background: #fff; }
  .page { width: 100%; max-width: 980px; margin: 0 auto; }
  .top { display: grid; grid-template-columns: 210px 1fr; gap: 22px; align-items: center; border-bottom: 4px solid #ef2533; padding-bottom: 14px; }
  .logo { max-width: 200px; max-height: 95px; object-fit: contain; }
  .kicker { color: #ef2533; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; font-size: 13px; }
  h1 { margin: 8px 0 4px; font-size: 32px; line-height: 1.05; color: #171923; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .pill { border: 1px solid #d9dce5; border-radius: 999px; padding: 6px 11px; font-size: 12px; background: #f8f8fb; }
  .solapa { width: 100%; height: 24px; object-fit: cover; margin: 12px 0 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { border: 1px solid #e0e1e8; border-radius: 12px; padding: 14px 16px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.05); break-inside: avoid; }
  .card h2 { color: #ef2533; margin: 0 0 8px; font-size: 15px; text-transform: uppercase; letter-spacing: .03em; border-bottom: 1px solid #f0b2ba; padding-bottom: 5px; }
  p { font-size: 13px; line-height: 1.38; margin: 0 0 7px; }
  table { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-top: 6px; }
  th { text-align: left; background: #ef2533; color: #fff; padding: 5px; border: 1px solid #ef2533; }
  td { padding: 5px; border: 1px solid #d9dce5; vertical-align: top; }
  tr:nth-child(even) td { background: #fafafa; }
  .footer { margin-top: 18px; border-top: 1px solid #e0e1e8; padding-top: 8px; font-size: 10px; color: #6b6f7a; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <img class="logo" src="{{LOGO_URI}}" alt="NANTA">
    <div>
      <div class="kicker">{{DOC_TYPE}}</div>
      <h1>{{PRODUCT}}</h1>
      <div class="meta">
        <span class="pill">{{ESPECIE}}</span>
        <span class="pill">{{SUBESPECIE}}</span>
        <span class="pill">{{LIFESTAGE}}</span>
      </div>
    </div>
  </header>
  <img class="solapa" src="{{SOLAPA_URI}}" alt="">
  <main class="grid">
    {{SECTIONS}}
  </main>
  <div class="footer"><span>Ficha generada automáticamente. Revisar antes de uso definitivo.</span><span>{{DATE}}</span></div>
</div>
</body>
</html>
